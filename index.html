<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSM Edit Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #12122a;
        }

        #toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #12122a;
            border-bottom: 1px solid #252550;
            flex-shrink: 0;
        }

        #toolbar h1 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #c8c8f0;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        #username {
            flex: 1;
            max-width: 300px;
            padding: 7px 12px;
            border: 1px solid #303068;
            border-radius: 6px;
            font-size: 0.9rem;
            background: #1e1e42;
            color: #e0e0ff;
            outline: none;
            transition: border-color 0.15s;
        }

        #username::placeholder { color: #50508a; }
        #username:focus { border-color: #6868cc; }

        #search-btn {
            padding: 7px 18px;
            background: #4545bb;
            color: #e8e8ff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.15s;
            white-space: nowrap;
        }

        #search-btn:hover:not(:disabled) { background: #5555cc; }

        #search-btn:disabled {
            background: #252550;
            color: #50508a;
            cursor: default;
        }

        #map { flex: 1; }

        #status {
            padding: 5px 16px;
            font-size: 0.78rem;
            background: #12122a;
            color: #70709a;
            border-top: 1px solid #252550;
            min-height: 26px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .leaflet-container { background: #1a1a3a; }
    </style>
</head>
<body>
    <div id="toolbar">
        <h1>OSM Edit Heatmap</h1>
        <input id="username" type="text" placeholder="Enter OSM username…" autocomplete="off" spellcheck="false" />
        <button id="search-btn" onclick="startSearch()">Search</button>
    </div>
    <div id="map"></div>
    <div id="status">Enter an OSM username above to visualize their edit history.</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script>
        const map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        let heatLayer = null;
        let activeAbort = null;

        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        async function startSearch() {
            const username = document.getElementById('username').value.trim();
            if (!username) return;

            if (activeAbort) activeAbort.abort();
            activeAbort = new AbortController();
            const { signal } = activeAbort;

            const btn = document.getElementById('search-btn');
            btn.disabled = true;
            btn.textContent = 'Loading…';

            if (heatLayer) {
                map.removeLayer(heatLayer);
                heatLayer = null;
            }

            try {
                const points = await fetchAllChangesets(username, signal);
                if (signal.aborted) return;

                if (points.length === 0) {
                    setStatus(`No geolocated changesets found for "${username}".`);
                } else {
                    heatLayer = L.heatLayer(points, {
                        radius: 25,
                        blur: 18,
                        maxZoom: 17,
                        gradient: { 0.2: '#3333cc', 0.4: '#00aaff', 0.6: '#00ffaa', 0.8: '#ffff00', 1.0: '#ff4422' }
                    }).addTo(map);

                    map.fitBounds(L.latLngBounds(points), { padding: [30, 30], maxZoom: 12 });
                    setStatus(`Loaded ${points.length.toLocaleString()} changesets for "${username}".`);
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                setStatus(`Error: ${err.message}`);
            } finally {
                if (!signal.aborted) {
                    btn.disabled = false;
                    btn.textContent = 'Search';
                }
            }
        }

        async function fetchAllChangesets(username, signal) {
            const seen = new Set();
            const points = [];
            const MAX_PAGES = 100; // cap at 10,000 changesets

            let params = `display_name=${encodeURIComponent(username)}&limit=100`;

            for (let page = 0; page < MAX_PAGES; page++) {
                if (signal.aborted) break;

                setStatus(`Fetching changesets for "${username}"… (${points.length.toLocaleString()} loaded)`);

                const resp = await fetch(
                    `https://api.openstreetmap.org/api/0.6/changesets.json?${params}`,
                    { signal }
                );

                if (!resp.ok) {
                    throw new Error(`OSM API returned ${resp.status} ${resp.statusText}`);
                }

                const { changesets = [] } = await resp.json();

                for (const cs of changesets) {
                    if (seen.has(cs.id)) continue;
                    seen.add(cs.id);
                    if (cs.min_lat != null && cs.max_lat != null && cs.min_lon != null && cs.max_lon != null) {
                        points.push([
                            (cs.min_lat + cs.max_lat) / 2,
                            (cs.min_lon + cs.max_lon) / 2
                        ]);
                    }
                }

                if (changesets.length < 100) break;

                // Advance cursor: 1 second before the oldest created_at in this page
                // (changesets are returned newest-first, so last entry is oldest)
                const oldest = new Date(changesets[changesets.length - 1].created_at);
                oldest.setSeconds(oldest.getSeconds() - 1);
                params = `display_name=${encodeURIComponent(username)}&limit=100&time=${encodeURIComponent(oldest.toISOString())}`;
            }

            return points;
        }

        document.getElementById('username').addEventListener('keydown', e => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
